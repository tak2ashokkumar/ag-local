<div class="d-flex justify-content-end move-dropdowns-up-end-of-top-tabs">
    <div>
        <data-refresh-btn (refresh)="refreshData($event)"></data-refresh-btn>
    </div>
</div>

<div class="row mb-2 mt-3 pl-2">
    <div class="col-6 p-0">
        <div class="card h-100 mb-0">
            <div class="card-body d-flex flex-column px-2 py-2">
                <div class="d-flex justify-content-between pointer-link">
                    <div class="d-flex justify-content-around align-items-center entity-card w-15 py-1 pointer-link"
                        [class.active]="currentPath == 'events'" (click)="goTo('events')">
                        <div class="font-lg font-500 text-truncate">Events</div>
                        
                    </div>
                    <div class="d-flex align-items-center">
                        <span class="fas fa-caret-right fa-2x text-secondary"></span>
                    </div>
                    <div class="d-flex flex-column justify-content-center entity-card w-16 py-1 pointer-link"
                        [class.active]="currentPath == 'alerts'" (click)="goTo('alerts')">
                        <div class="d-flex justify-content-between">
                            <span class="font-500 text-truncate">Alerts</span>
                            
                        </div>
                        <!-- <div class="d-flex">
                            <span class="font-xss sub-entity font-500 text-truncate">Noise Reduction :
                            </span>
                            
                        </div> -->
                    </div>
                    <div class="d-flex align-items-center">
                        <span class="fas fa-caret-right fa-2x text-secondary"></span>
                    </div>
                    <div class="d-flex flex-column justify-content-center entity-card w-16 py-1 pointer-link"
                        [class.active]="currentPath == 'conditions'" (click)="goTo('conditions')">
                        <div class="d-flex justify-content-between">
                            <span class="font-500 text-truncate">Conditions</span>
                            
                        </div>
                        <!-- <div class="d-flex">
                            <span class="font-xss sub-entity font-500 text-truncate">Correlation % :
                            </span>
                            
                        </div> -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
