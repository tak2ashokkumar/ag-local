<div class="row d-flex justify-content-end mr-2 pr-1 mt-2">
    <button class="btn btn-pill btn-warning pull-right btn-sm ml-2" type="button" (click)="goBack()"
        [tooltip]="'Go Back'" container="body">
        <i class="fa fa-arrow-left"></i>
    </button>
</div>
<div class="container-fluid px-3 pt-2">
    <div class="card round-edge">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-2">
            <span class="font-lg font-500">{{viewData?.title}}</span>
        </div>
        <div class="card-body d-flex justify-content-center align-items-center dashboard-placeholder">
            <span class="text-muted">Dashboard content will be added here.</span>
        </div>
    </div>
</div>
